<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Darbhanga - Citizen Reporting Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">Fix Darbhanga</a>
            <div class="nav-links" id="navLinks">
                <a href="feed.html">View Issues</a>
                <a href="report.html" class="btn btn-primary">Report Issue</a>
                <span id="authSection">
                    <a href="auth.html" class="btn btn-outline">Login</a>
                </span>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Make Darbhanga Better</h1>
            <p>Report civic issues directly to authorities and track their resolution in real-time.</p>
            <div class="hero-btns">
                <a href="report.html" class="btn btn-primary btn-lg">Report an Issue</a>
                <a href="feed.html" class="btn btn-outline btn-lg">Explore Map</a>
            </div>
        </div>
    </header>

    <section class="stats container">
        <div class="grid">
            <div class="card stat-card">
                <h2 id="totalReports">0</h2>
                <p>Issues Reported</p>
            </div>
            <div class="card stat-card">
                <h2 id="resolvedReports" style="color: var(--secondary);">0</h2>
                <p>Issues Resolved</p>
            </div>
            <div class="card stat-card">
                <h2 id="activeUsers">0</h2>
                <p>Active Citizens</p>
            </div>
        </div>
    </section>

    <section class="latest-issues container">
        <h2>Latest Reports</h2>
        <div id="latestGrid" class="grid">
            <!-- Loaded via JS -->
        </div>
    </section>

    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, query, limit, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const latestGrid = document.getElementById('latestGrid');
        const q = query(collection(db, "issues"), orderBy("createdAt", "desc"), limit(3));
        
        onSnapshot(q, (snapshot) => {
            latestGrid.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                latestGrid.innerHTML += `
                    <div class="card">
                        <img src="${data.imageUrls[0]}" class="card-img">
                        <div class="card-body">
                            <h3>${data.title}</h3>
                            <span class="badge">${data.category}</span>
                            <p>${data.description.substring(0, 100)}...</p>
                            <a href="details.html?id=${doc.id}" class="btn-text">View Details →</a>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
