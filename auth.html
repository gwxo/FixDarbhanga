<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Fix Darbhanga</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card { max-width: 400px; margin: 60px auto; padding: 30px; }
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; font-weight: 600; color: #666; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .hidden { display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .or-divider { text-align: center; margin: 20px 0; color: #888; position: relative; }
        .or-divider::before { content: ""; position: absolute; left: 0; top: 50%; width: 45%; height: 1px; background: #ddd; }
        .or-divider::after { content: ""; position: absolute; right: 0; top: 50%; width: 45%; height: 1px; background: #ddd; }
        .google-btn { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            background: white; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">Fix Darbhanga</a>
        </div>
    </nav>

    <div class="container">
        <div class="card auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" id="showLogin">Login</button>
                <button class="tab-btn" id="showRegister">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginSection">
                <form id="loginForm">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerSection" class="hidden">
                <form id="registerForm">
                    <div class="form-group">
                        <input type="text" id="regName" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="regEmail" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="regPassword" placeholder="Password (Min. 6 chars)" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </form>
            </div>

            <div class="or-divider">OR</div>

            <button id="googleBtn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
